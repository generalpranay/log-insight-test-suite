name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: mvn -B test -pl unit-tests

      - name: Run integration tests
        run: mvn -B test -pl integration-tests

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-unit-integration
          path: |
            unit-tests/target/allure-results
            integration-tests/target/allure-results
          if-no-files-found: ignore

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Start test stack
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for application health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 5
          done
          echo "Application did not become healthy in time"
          docker compose -f docker-compose.test.yml logs
          exit 1

      - name: Run API tests
        run: mvn -B test -pl api-tests -Dapi.base.url=http://localhost:8080 -Dgroups=api

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: api-tests/target/allure-results
          if-no-files-found: ignore

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e-tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e-tests/playwright-report
          if-no-files-found: ignore

  publish-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [unit-and-integration, api-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download Allure artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          pattern: allure-results-*
          merge-multiple: true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: downloaded-artifacts
          allure_report: allure-report

      - name: Deploy report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
